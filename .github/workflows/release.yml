name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: swift test

      - name: Package app
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="dev"
          VERSION="$VERSION" ./Scripts/package_app.sh

      - name: Zip bundle
        run: |
          cd build
          ditto -c -k --keepParent Vremena.app Vremena.zip

      - name: Build DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="dev"
          VERSION="$VERSION" ./Scripts/make_dmg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vremena
          path: |
            build/Vremena.zip
            build/Vremena-*.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/Vremena.zip
            build/Vremena-*.dmg
          generate_release_notes: true
